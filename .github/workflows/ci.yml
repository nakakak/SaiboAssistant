name: CI

on:
  push:
    branches: [main, master]
    paths:
      - "**.go"
      - go.mod
      - go.sum
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "**.go"
      - go.mod
      - go.sum

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Test and vet
        run: |
          go test ./...
          go vet ./...

      - name: Build
        run: go build -trimpath -ldflags="-s -w" -o /tmp/openclaw-connector ./cmd/openclaw-connector
