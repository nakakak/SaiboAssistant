name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            goos: linux
            goarch: amd64
          # 须用 ubuntu-24.04-arm；写成 ubuntu-24.04-arm64 会永远排不到 runner（Queued 不结束）
          - runs-on: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runs-on: macos-latest
            goos: darwin
            goarch: arm64
          # Intel macOS：勿用已缩容/下线的 macos-13，改用 macos-15-intel（见 GitHub runner-images 说明）
          - runs-on: macos-15-intel
            goos: darwin
            goarch: amd64
          - runs-on: windows-latest
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Linux dependencies (Fyne / GLFW)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libgl1-mesa-dev libxinerama-dev libxi-dev libxcursor-dev libxrandr-dev libxxf86vm-dev xorg-dev

      - name: Windows MinGW (CGO)
        if: runner.os == 'Windows'
        run: choco install mingw -y

      - name: Build and package
        id: pack
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            MINGW_BIN="/c/ProgramData/chocolatey/lib/mingw/tools/install/mingw64/bin"
            if [[ -d "$MINGW_BIN" ]]; then
              echo "$MINGW_BIN" >> "$GITHUB_PATH"
            fi
            export PATH="$MINGW_BIN:$PATH"
            command -v gcc
          fi
          VERSION="${GITHUB_REF_NAME}"
          NAME="openclaw-connector_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            BIN="openclaw-connector.exe"
            go build -trimpath -ldflags="-s -w" -o "$BIN" ./cmd/openclaw-connector
            mkdir -p "$NAME"
            cp "$BIN" config.example.yaml README.md internal/ui/iconai.jpg "$NAME/"
            # windows-latest 的 bash 里通常没有 zip；用系统自带的 bsdtar 打 zip
            tar.exe -a -c -f "${NAME}.zip" "$NAME"
            BUNDLE="${NAME}.zip"
            cp "$BIN" SaiboAssistant-Windows-x64.exe
            BRAND="SaiboAssistant-Windows-x64.exe"
          else
            BIN="openclaw-connector"
            go build -trimpath -ldflags="-s -w" -o "$BIN" ./cmd/openclaw-connector
            mkdir -p "$NAME"
            cp "$BIN" config.example.yaml README.md internal/ui/iconai.jpg "$NAME/"
            tar czf "${NAME}.tar.gz" "$NAME"
            BUNDLE="${NAME}.tar.gz"
            case "${{ matrix.goos }}-${{ matrix.goarch }}" in
              darwin-arm64)  cp "$BIN" SaiboAssistant-macOS-arm64; BRAND="SaiboAssistant-macOS-arm64" ;;
              darwin-amd64)  cp "$BIN" SaiboAssistant-macOS-x64; BRAND="SaiboAssistant-macOS-x64" ;;
              linux-amd64)   cp "$BIN" SaiboAssistant-Linux-x64; BRAND="SaiboAssistant-Linux-x64" ;;
              linux-arm64)   cp "$BIN" SaiboAssistant-Linux-arm64; BRAND="SaiboAssistant-Linux-arm64" ;;
            esac
            chmod +x "$BRAND"
          fi
          echo "bundle=$BUNDLE" >> "$GITHUB_OUTPUT"
          echo "brand=$BRAND" >> "$GITHUB_OUTPUT"
          ls -la "$BUNDLE" "$BRAND"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ steps.pack.outputs.bundle }}
            ${{ steps.pack.outputs.brand }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd dist
          files=(openclaw-connector_*.tar.gz openclaw-connector_*.zip SaiboAssistant-*)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release binaries in dist/"; ls -la; exit 1
          fi
          sha256sum "${files[@]}" | sort > ../checksums-sha256.txt
          cd ..
          cat checksums-sha256.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            dist/*
            checksums-sha256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
